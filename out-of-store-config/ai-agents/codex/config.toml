# Codex CLI Configuration
# https://developers.openai.com/codex/config-reference

# Model selection - use the default (gpt-5.5-codex for signed-in users)
# model = "gpt-5.5-codex"
model_reasoning_effort = "medium"

# Recognize CLAUDE.md as fallback for projects without AGENTS.md
project_doc_fallback_filenames = ["AGENTS.md", "CLAUDE.md", ".claude/CLAUDE.md"]

# Approval and sandbox policies
# Options: untrusted, on-request, never
approval_policy = "never"

# Options: read-only, workspace-write, danger-full-access
sandbox_mode = "workspace-write"
personality = "pragmatic"
model = "gpt-5.5"

[sandbox_workspace_write]
network_access = true

# Feature flags
exclude_skills = []
web_search = "live"

[features]
shell_tool = true
parallel = true
view_image_tool = true
skills = true

# Shell environment
[shell_environment_policy]
inherit = "core"
exclude = ["AWS_SECRET*", "AZURE_*", "GOOGLE_*"]

[projects."/home/rich/code/notes"]
trust_level = "trusted"

